<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poster Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="controls">
        <h1>Poster Generator</h1>

        <section class="collapsible-section">
          <details id="categories-menu" class="collapsible">
            <summary>
              <span class="collapsible-heading">Categorie</span>
              <span class="collapsible-meta">
                <span id="categories-selection" class="collapsible-value">Nessuna</span>
              </span>
            </summary>
            <div id="categories" class="checkbox-group"></div>
          </details>
        </section>

        <section class="collapsible-section">
          <details id="format-menu" class="collapsible">
            <summary>
              <span class="collapsible-heading">Formato</span>
              <span class="collapsible-meta">
                <span id="format-selection" class="collapsible-value">A4 ↕</span>
              </span>
            </summary>
            <div id="formats" class="radio-group"></div>
          </details>
        </section>

        <section class="collapsible-section">
          <details id="grid-menu" class="collapsible">
            <summary>
              <span class="collapsible-heading">Griglia</span>
              <span class="collapsible-meta">
                <span id="grid-selection" class="collapsible-value">5 × 7</span>
              </span>
            </summary>
            <div id="grids" class="radio-group"></div>
          </details>
        </section>

        <section>
          <h2>Sfondo</h2>
          <input type="color" id="background" value="#ffffff" />
        </section>

        <section>
          <h2>Descrizione</h2>
          <textarea id="description" rows="3" placeholder="Testo libero (opzionale)"></textarea>
        </section>

        <section>
          <label class="toggle-option">
            <input type="checkbox" id="random-rotation" />
            Rotazione casuale immagini
          </label>
        </section>

        <div class="actions">
          <button id="generate" disabled>Genera</button>
          <button id="regenerate" disabled>Rigenera</button>
        </div>

        <section>
          <h2>Esporta</h2>
          <div class="export-group">
            <button id="export-png" disabled>PNG</button>
            <button id="export-jpg" disabled>JPG</button>
            <button id="export-pdf" disabled>PDF</button>
          </div>
        </section>
      </aside>

      <main class="preview-panel">
        <div class="preview-frame">
          <canvas id="preview"></canvas>
        </div>
      </main>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
