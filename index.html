<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poster Generator</title>
    <script>
      (function () {
        if (location.hostname.endsWith('github.io') && location.pathname.includes('/poster-generator')) {
          var base = document.createElement('base');
          base.href = '/poster-generator/';
          document.head.appendChild(base);
        }
        try {
          var theme = localStorage.getItem('ui-theme');
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.dataset.theme = theme;
          }
        } catch (_) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="controls">
        <header class="app-header">
          <button type="button" class="logo-toggle" id="theme-toggle" aria-label="Cambia tema scuro/chiaro">
            <img src="immagini/logo.svg" alt="" class="app-logo" width="36" height="32" />
          </button>
          <h1>Poster Generator</h1>
        </header>

        <section class="collapsible-section">
          <div class="collapsible" data-collapsible>
            <button type="button" class="collapsible-trigger" aria-expanded="false">
              <span class="collapsible-heading">Categorie</span>
              <span class="collapsible-meta">
                <span id="categories-selection" class="collapsible-value">Nessuna</span>
                <span class="collapsible-chevron" aria-hidden="true"></span>
              </span>
            </button>
            <div class="collapsible-panel" hidden>
              <div id="categories" class="checkbox-group"></div>
            </div>
          </div>
        </section>

        <section class="collapsible-section">
          <div class="collapsible" data-collapsible>
            <button type="button" class="collapsible-trigger" aria-expanded="false">
              <span class="collapsible-heading">Formato</span>
              <span class="collapsible-meta">
                <span id="format-selection" class="collapsible-value">A4 ↕</span>
                <span class="collapsible-chevron" aria-hidden="true"></span>
              </span>
            </button>
            <div class="collapsible-panel" hidden>
              <div id="formats" class="radio-group"></div>
            </div>
          </div>
        </section>

        <section class="collapsible-section">
          <div class="collapsible" data-collapsible>
            <button type="button" class="collapsible-trigger" aria-expanded="false">
              <span class="collapsible-heading">Griglia</span>
              <span class="collapsible-meta">
                <span id="grid-selection" class="collapsible-value">5 × 7</span>
                <span class="collapsible-chevron" aria-hidden="true"></span>
              </span>
            </button>
            <div class="collapsible-panel" hidden>
              <div id="grids" class="radio-group"></div>
            </div>
          </div>
        </section>

        <section class="color-field">
          <h2>Sfondo</h2>
          <label class="color-swatch">
            <input type="color" id="background" value="#ffffff" />
          </label>
        </section>

        <section class="color-field">
          <label class="color-field-heading">
            <input type="checkbox" id="tint-enabled" />
            Tinta disegni
          </label>
          <label class="color-swatch">
            <input type="color" id="tint-color" value="#c0392b" disabled />
          </label>
        </section>

        <section>
          <h2>Descrizione</h2>
          <textarea id="description" rows="3" placeholder="Testo libero (opzionale)"></textarea>
        </section>

        <section>
          <label class="toggle-option">
            <input type="checkbox" id="adaptive-footer" />
            Adatta logo e descrizione allo sfondo
          </label>
        </section>

        <section>
          <label class="toggle-option">
            <input type="checkbox" id="random-rotation" />
            Rotazione casuale immagini
          </label>
        </section>

        <div class="actions">
          <button type="button" class="btn-primary" id="generate" disabled>Genera</button>
          <button type="button" class="btn-secondary" id="regenerate" disabled>Rigenera</button>
        </div>

        <section>
          <h2>Esporta</h2>
          <div class="export-group">
            <button type="button" class="btn-secondary" id="export-png" disabled>PNG</button>
            <button type="button" class="btn-secondary" id="export-jpg" disabled>JPG</button>
            <button type="button" class="btn-secondary" id="export-pdf" disabled>PDF</button>
          </div>
        </section>
      </aside>

      <main class="preview-panel">
        <div class="preview-frame">
          <canvas id="preview"></canvas>
        </div>
      </main>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
